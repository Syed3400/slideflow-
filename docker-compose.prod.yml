# Production stack — use with a filled .env file at repo root.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-slideflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slideflow}
      NEXT_API_URL: ${NEXT_API_URL:-http://frontend:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN}
      INTERNAL_SIGNING_SECRET: ${INTERNAL_SIGNING_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_PUBSUB_CHANNEL: ${REDIS_PUBSUB_CHANNEL:-presentation_events}
      WS_HEARTBEAT_SECONDS: ${WS_HEARTBEAT_SECONDS:-30}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      NEXT_API_URL: ${NEXT_API_URL:-http://frontend:3000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_SIGNING_SECRET: ${INTERNAL_SIGNING_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_PUBSUB_CHANNEL: ${REDIS_PUBSUB_CHANNEL:-presentation_events}
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slideflow}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      FASTAPI_URL: ${FASTAPI_URL:-http://backend:8000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_SIGNING_SECRET: ${INTERNAL_SIGNING_SECRET:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Set Clerk keys}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Set Clerk keys}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      UPLOADTHING_APP_ID: ${UPLOADTHING_APP_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - db
      - backend

volumes:
  postgres_data:
  redis_data:
