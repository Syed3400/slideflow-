# Example Nginx reverse proxy for a single VPS.
# Replace YOUR_DOMAIN and paths, then:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/slideflow
#   sudo ln -s /etc/nginx/sites-available/slideflow /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app.YOUR_DOMAIN.com -d api.YOUR_DOMAIN.com

upstream slideflow_frontend {
    server 127.0.0.1:3000;
}

upstream slideflow_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name app.YOUR_DOMAIN.com;

    location / {
        proxy_pass http://slideflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.YOUR_DOMAIN.com;

    location / {
        proxy_pass http://slideflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://slideflow_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
